<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Fitness">
<meta name="theme-color" content="#0c0c14">
<title>Fitness Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{overscroll-behavior:none;background:#0c0c14;color:#e8e8e8;font-family:'DM Sans',system-ui,sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh;min-height:100dvh}
::-webkit-scrollbar{display:none}
input[type=number]{-moz-appearance:textfield;font-size:16px!important}
input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none}
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes fi{from{opacity:0}to{opacity:1}}
.fu{animation:fu .25s ease both}.fi{animation:fi .2s ease}
.wrap{max-width:480px;margin:0 auto;padding:12px 16px 100px}
.hdr{background:linear-gradient(180deg,#14141f,#0c0c14);padding:16px 20px 14px;padding-top:max(16px,env(safe-area-inset-top));position:sticky;top:0;z-index:50}
.hdr-in{max-width:480px;margin:0 auto}
.btn{border:none;cursor:pointer;font-family:'DM Sans';-webkit-appearance:none}
.card{background:rgba(255,255,255,.04);border-radius:16px;border:1px solid rgba(255,255,255,.06);padding:16px 18px;margin-bottom:10px;position:relative;overflow:hidden}
.card-box:active{transform:scale(0.98);transition:transform .1s}
.inp{width:100%;padding:10px 12px;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.08);border-radius:10px;font-size:16px;font-family:'JetBrains Mono';color:#fff;outline:none;transition:border .15s}
.inp:focus{border-color:var(--ac)}
.inp::placeholder{color:#444}
.tab-bar{display:flex;gap:4px;margin-bottom:14px;background:rgba(255,255,255,.04);border-radius:12px;padding:4px}
.tab-btn{flex:1;padding:10px 0;border-radius:10px;border:none;font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans';transition:all .15s;background:transparent;color:#666}
.tab-btn.active{color:#fff}
.pill-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
.pill{min-width:40px;height:36px;border-radius:18px;border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:'JetBrains Mono';flex-shrink:0;transition:all .15s;background:rgba(255,255,255,.06);color:#555}
.pill.on{background:#e94560;color:#fff}
.yt-btn{display:inline-flex;align-items:center;gap:4px;margin-top:10px;font-size:12px;font-weight:600;color:#e94560;text-decoration:none;background:#e9456018;padding:8px 14px;border-radius:24px}
.start-badge{margin-top:10px;background:#92400e22;border:1px solid #92400e44;border-radius:10px;padding:8px 12px;font-size:12px}
.progress-bar{position:absolute;bottom:0;left:0;height:3px;border-radius:0 3px 0 0;transition:width .3s}
.icon-circle{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.mono{font-family:'JetBrains Mono'}
</style>
</head>
<body>
<div id="app"></div>
<script>
const SK="fitness-v7";
const R={
monday:{l:"Mon",f:"Monday",t:"Upper Pull Strength",c:"#1d3557",cl:"#d4e4f7",ic:"🔵",cd:"Incline walk 6–8%, 15 min",ex:[
{n:"DB Bent-Over Row",s:"4×6–8",r:"90s",nt:"Flat back, pull to hip, squeeze 2s",mu:"Back · Biceps · Rear Delts",yt:"https://www.youtube.com/watch?v=roCP6wCXPqo",kg:"10 each",kn:"Start light, nail form"},
{n:"Lat Pulldown",s:"4×6–8",r:"90s",nt:"Wide grip, lean back, pull to chest",mu:"Lats · Biceps",yt:"https://www.youtube.com/watch?v=CAwf7n6Luuc",kg:"30",kn:"Under your 35 for clean reps"},
{n:"Cable Face Pull",s:"3×12–15",r:"60s",nt:"Rope to forehead, elbows high",mu:"Rear Delts · Traps · RC",yt:"https://www.youtube.com/watch?v=rep-qVOkqgk",kg:"10",kn:"Light — prehab"},
{n:"DB Hammer Curl",s:"3×10",r:"60s",nt:"Neutral grip, no swinging",mu:"Biceps · Forearms",yt:"https://www.youtube.com/watch?v=zC3nLlEvin4",kg:"6 each",kn:"Your current — good"},
{n:"Cable Reverse Fly",s:"3×12",r:"60s",nt:"Cross cables, arms wide",mu:"Rear Delts · Rhomboids",yt:"https://www.youtube.com/watch?v=V0cMAtherBo",kg:"5 each",kn:"Very light — isolation"},
{n:"Farmer's Carry",s:"3×30–40m",r:"60s",nt:"Heavy DBs, tall posture",mu:"Traps · Forearms · Core",yt:"https://www.youtube.com/watch?v=Fkzk_RqlYig",kg:"16 each",kn:"Heavy but walkable"}]},
wednesday:{l:"Wed",f:"Wednesday",t:"Upper Push (pre-boxing)",c:"#e76f51",cl:"#fce5de",ic:"🟠",cd:"Light incline walk 5%, 12 min",nt:"Moderate — boxing tomorrow",ex:[
{n:"DB Flat Bench Press",s:"3×8",r:"75s",nt:"Controlled tempo, full ROM",mu:"Chest · Triceps · Front Delts",yt:"https://www.youtube.com/watch?v=VmB1G1K7v94",kg:"8 each",kn:"Machine 20kg ≈ 8kg DBs"},
{n:"DB Shoulder Press",s:"3×8",r:"75s",nt:"Press overhead smoothly",mu:"Shoulders · Triceps",yt:"https://www.youtube.com/watch?v=qEwKCR5JCog",kg:"6 each",kn:"Machine 10kg ≈ 6kg DBs"},
{n:"Cable Chest Fly",s:"3×10–12",r:"60s",nt:"Slight elbow bend, squeeze",mu:"Chest · Front Delts",yt:"https://www.youtube.com/watch?v=Iwe6AmxVf7o",kg:"7.5",kn:"Feel the stretch"},
{n:"DB Lateral Raise",s:"3×12",r:"60s",nt:"Light, shoulder height",mu:"Side Delts",yt:"https://www.youtube.com/watch?v=3VcKaXpzqRo",kg:"4 each",kn:"Your current — perfect"},
{n:"Tricep Pushdown",s:"3×10–12",r:"60s",nt:"Rope, elbows pinned",mu:"Triceps",yt:"https://www.youtube.com/watch?v=2-LAMcpzODU",kg:"15",kn:"Burn by rep 10"},
{n:"DB Shrug",s:"3×12",r:"45s",nt:"Squeeze traps 2s, slow lower",mu:"Traps",yt:"https://www.youtube.com/watch?v=cJRVVxmytaM",kg:"12 each",kn:"Can go heavier"}]},
thursday:{l:"Thu",f:"Thursday",t:"Boxing",c:"#e94560",cl:"#fce4e8",ic:"🥊",cd:"In session",box:true,ex:[]},
friday:{l:"Fri",f:"Friday",t:"Full Body Athletic",c:"#7b2cbf",cl:"#eddcf5",ic:"🟣",cd:"Rope/rower intervals 8–10 min",nt:"Extended — power & quality",ex:[
{n:"Kettlebell Swings",s:"4×12",r:"60s",nt:"Explosive hip snap",mu:"Glutes · Hams · Core · Traps",yt:"https://www.youtube.com/watch?v=YSxHifyI6s8",kg:"12",kn:"Focus on hip snap"},
{n:"DB Incline Press",s:"3×8",r:"75s",nt:"Upper chest, controlled",mu:"Upper Chest · Shoulders · Tri",yt:"https://www.youtube.com/watch?v=8iPEnn-ltC8",kg:"8 each",kn:"Same as flat bench"},
{n:"Seated Cable Row",s:"3×8–10",r:"75s",nt:"Squeeze back at peak",mu:"Back · Biceps · Rear Delts",yt:"https://www.youtube.com/watch?v=GZbfZ033f74",kg:"20",kn:"Your current row weight"},
{n:"DB Step-Ups",s:"3×8/leg",r:"75s",nt:"Drive through front heel",mu:"Quads · Glutes",yt:"https://www.youtube.com/watch?v=WCFCdxzFBa4",kg:"8 each",kn:"Balance > weight"},
{n:"Cable Woodchop",s:"3×10/side",r:"60s",nt:"Rotational — boxing transfer",mu:"Obliques · Core",yt:"https://www.youtube.com/watch?v=pAplQXk3dkU",kg:"10",kn:"Feel the rotation"},
{n:"Hanging Knee Raises",s:"3×10–12",r:"60s",nt:"Slow, no swinging",mu:"Abs · Hip Flexors",yt:"https://www.youtube.com/watch?v=Pr1ieGZ5atk",kg:"BW",kn:"Bodyweight"}]},
saturday:{l:"Sat",f:"Saturday",t:"Lower Strength + Agility",c:"#2d6a4f",cl:"#d8f3dc",ic:"🟢",cd:"Incline walk 15–20 min zone 2",nt:"Main leg day — go heavy",ex:[
{n:"DB Bulgarian Split Squat",s:"4×6–8/leg",r:"90s",nt:"Rear foot on bench, deep bend",mu:"Quads · Glutes · Core",yt:"https://www.youtube.com/watch?v=2C-uNgKwPLE",kg:"6 each",kn:"Balance hard at first"},
{n:"DB Romanian Deadlift",s:"4×8",r:"90s",nt:"Hinge at hips, hamstring stretch",mu:"Hams · Glutes · Low Back",yt:"https://www.youtube.com/watch?v=szfL_cQaG8s",kg:"10 each",kn:"Form > load week 1"},
{n:"KB Goblet Squat",s:"3×10–12",r:"60s",nt:"KB at chest, sit deep",mu:"Quads · Glutes · Core",yt:"https://www.youtube.com/watch?v=MeIiIdhvXT4",kg:"12",kn:"Depth > weight"},
{n:"Seated Hamstring Curl",s:"3×10–12",r:"60s",nt:"Slow 3s negative, feet flexed",mu:"Hamstrings",yt:"https://www.youtube.com/watch?v=Orxowest56U",kg:"20",kn:"Your current weight"},
{n:"Cable Glute Kickback",s:"3×10–12/leg",r:"60s",nt:"Ankle strap, squeeze top",mu:"Glutes",yt:"https://www.youtube.com/watch?v=dFSNaRjFd-E",kg:"7.5",kn:"Feel glute, not back"},
{n:"Lateral Band Walk",s:"3×12/dir",r:"45s",nt:"Band above knees, low stance",mu:"Glute Med · Hip Stability",yt:"https://www.youtube.com/watch?v=iMxSB2pXpQY",kg:"Band",kn:"Medium band"},
{n:"Box Jumps",s:"3×5–6",r:"60s",nt:"Explosive, land soft, step down",mu:"Quads · Glutes · Calves",yt:"https://www.youtube.com/watch?v=NBY9-kTuHEk",kg:"BW",kn:"Low box first"}]},
sunday:{l:"Sun",f:"Sunday",t:"Lower Light + Core",c:"#457b9d",cl:"#cfe2ef",ic:"🔘",cd:"Easy incline walk 10–12 min",nt:"Lighter — core & movement quality",ex:[
{n:"DB Goblet Squat",s:"3×10",r:"60s",nt:"Depth & control > load",mu:"Quads · Glutes · Core",yt:"https://www.youtube.com/watch?v=MeIiIdhvXT4",kg:"10",kn:"Lighter than Saturday"},
{n:"DB Walking Lunges",s:"3×8/leg",r:"60s",nt:"Long stride, balance",mu:"Quads · Glutes · Hams",yt:"https://www.youtube.com/watch?v=D7KaRcUTQeE",kg:"6 each",kn:"Balance > weight"},
{n:"Seated Hamstring Curl",s:"3×12",r:"60s",nt:"Lighter, mind-muscle",mu:"Hamstrings",yt:"https://www.youtube.com/watch?v=Orxowest56U",kg:"15",kn:"Lighter than Sat"},
{n:"Standing Calf Raise",s:"3×12–15",r:"45s",nt:"Full range, squeeze top",mu:"Calves",yt:"https://www.youtube.com/watch?v=gwLzBJYoWlI",kg:"10 each",kn:"DB each hand"},
{n:"Pallof Press",s:"3×10/side",r:"60s",nt:"Anti-rotation, hold 2–3s",mu:"Core",yt:"https://www.youtube.com/watch?v=AH_QZLm_0-s",kg:"10",kn:"Moderate tension"},
{n:"Dead Bug",s:"3×10/side",r:"45s",nt:"Lower back glued to floor",mu:"Deep Core · Abs",yt:"https://www.youtube.com/watch?v=I5xbsA71v1A",kg:"BW",kn:"Harder than it looks"},
{n:"Plank Hold",s:"2×45–60s",r:"45s",nt:"Brace hard, breathe",mu:"Full Core",yt:"https://www.youtube.com/watch?v=ASdvN_XEl_c",kg:"BW",kn:"Bodyweight"}]}
};
const WU={upper:[{n:"Rowing or bike",d:"3 min"},{n:"Band Pull-Aparts",d:"15 reps"},{n:"Band Over-Shoulder Rotations",d:"10 reps"},{n:"Arm Circles",d:"20 each"},{n:"Scapular Push-Ups",d:"10 reps"},{n:"Plank",d:"30s"}],lower:[{n:"Incline walk or bike",d:"3 min"},{n:"Leg Swings F/B",d:"10 each"},{n:"Leg Swings L/R",d:"10 each"},{n:"Glute Bridges",d:"12 reps"},{n:"BW Squats",d:"10 reps"},{n:"World's Greatest Stretch",d:"4 each"}],athletic:[{n:"Jump rope or rower",d:"3 min"},{n:"Glute Bridges",d:"10 reps"},{n:"Band Pull-Aparts",d:"15 reps"},{n:"BW Reverse Lunges",d:"8 each"},{n:"Band Rotations",d:"10 reps"},{n:"Light Jump Rope",d:"1 min"}]};
const WM={monday:"upper",wednesday:"upper",friday:"athletic",saturday:"lower",sunday:"lower"};
const CD=[{n:"Standing Hamstring Stretch",d:"45s each"},{n:"Seated Hamstring Stretch",d:"45s each"},{n:"Hip Flexor Stretch",d:"45s each"},{n:"Figure-4 Glute Stretch",d:"30–45s each"},{n:"Child's Pose",d:"30s"},{n:"Calf Stretch",d:"30s each"}];
const DO=["monday","wednesday","thursday","friday","saturday","sunday"];

let state={v:"week",ad:null,pd:{},wk:1,tab:"exercises",showStart:true};
try{const s=localStorage.getItem(SK);if(s)state.pd=JSON.parse(s)}catch(e){}
function sv(){try{localStorage.setItem(SK,JSON.stringify(state.pd))}catch(e){}}
function gv(dk,ei,si,f){return state.pd[`w${state.wk}_${dk}_ex${ei}_s${si}_${f}`]||""}
function gpv(dk,ei,si,f){return state.wk<=1?null:(state.pd[`w${state.wk-1}_${dk}_ex${ei}_s${si}_${f}`]||null)}
function gns(s){const m=s.match(/(\d+)/);return m?parseInt(m[1]):3}

function render(){
const a=document.getElementById("app");
const {v,ad,wk,tab,showStart}=state;
let h="";

// Header
h+=`<div class="hdr"><div class="hdr-in">`;
if(v==="week"){
h+=`<div style="display:flex;justify-content:space-between;align-items:center">
<div><h1 style="font-size:24px;font-weight:700;letter-spacing:-.5px;color:#fff">Fitness</h1><p style="font-size:11px;color:#666;margin-top:1px">12-Week Athletic Program</p></div>
<button class="btn" onclick="resetAll()" style="background:rgba(255,255,255,.06);color:#666;padding:8px 14px;border-radius:10px;font-size:11px">Reset</button></div>`;
h+=`<div class="pill-row" style="margin-top:12px">`;
for(let w=1;w<=12;w++) h+=`<button class="btn pill ${wk===w?'on':''}" onclick="setWk(${w})">${w}</button>`;
h+=`</div>`;
}else{
const d=R[ad];
h+=`<div style="display:flex;align-items:center;gap:12px">
<button class="btn" onclick="goWeek()" style="background:rgba(255,255,255,.08);color:#fff;width:40px;height:40px;border-radius:12px;font-size:18px;display:flex;align-items:center;justify-content:center">←</button>
<div><div style="font-size:12px;color:#666;font-weight:600">Week ${wk}</div><h2 style="font-size:18px;font-weight:700;color:#fff">${d.f}</h2></div></div>`;
}
h+=`</div></div>`;

h+=`<div class="wrap">`;

if(v==="week"){
h+=`<div class="fi">`;
h+=`<div class="card" style="display:flex;align-items:center;gap:10px;border:none">
<span style="font-size:20px">🚶</span><div><div style="font-size:13px;font-weight:600;color:#ccc">Daily Steps</div><div style="font-size:11px;color:#666">8,000 – 10,000 target</div></div></div>`;

DO.forEach((dk,i)=>{
const d=R[dk],ec=d.ex.length,lg=d.ex.filter((_,ei)=>gv(dk,ei,0,"w")).length,pct=ec>0?Math.round(lg/ec*100):0;
h+=`<div class="fu" style="animation-delay:${i*40}ms">
<div class="card card-box" ${!d.box?`onclick="openDay('${dk}')"`:`style="border-color:#e9456033"`}>`;
if(lg>0&&!d.box) h+=`<div class="progress-bar" style="width:${pct}%;background:${d.c}"></div>`;
h+=`<div style="display:flex;align-items:center;gap:14px">
<div class="icon-circle" style="background:${d.c}22">${d.ic}</div>
<div style="flex:1">
<div style="display:flex;align-items:center;gap:8px">
<span style="font-size:12px;font-weight:700;color:${d.c};text-transform:uppercase;letter-spacing:1px">${d.l}</span>
${d.box?'<span style="font-size:10px;background:#e9456033;color:#e94560;padding:2px 8px;border-radius:10px;font-weight:600">FIXED</span>':''}
</div>
<div style="font-size:15px;font-weight:600;color:#fff;margin-top:2px">${d.t}</div>
<div style="font-size:11px;color:#555;margin-top:2px">${d.box?'Conditioning · Core · Footwork':ec+' exercises · '+d.cd}</div>
</div>`;
if(!d.box){h+=lg>0?`<div style="background:${lg===ec?'#2d6a4f':'#92400e'};color:#fff;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700">${lg}/${ec}</div>`:`<div style="color:#333;font-size:22px">›</div>`}
h+=`</div></div></div>`;
});

// Tuesday rest
h+=`<div class="fu" style="animation-delay:250ms"><div class="card" style="border-color:rgba(255,255,255,.04);background:rgba(255,255,255,.02)">
<div style="display:flex;align-items:center;gap:14px">
<div class="icon-circle" style="background:rgba(255,255,255,.04)">😴</div>
<div><div style="font-size:12px;font-weight:700;color:#444;text-transform:uppercase;letter-spacing:1px">Tue</div><div style="font-size:15px;font-weight:600;color:#555">Rest Day</div><div style="font-size:11px;color:#444">Recovery · Walking · Stretching</div></div>
</div></div></div>`;
h+=`</div>`;

}else if(v==="day"&&ad){
const d=R[ad],wu=WU[WM[ad]];
h+=`<div class="fi">`;
h+=`<div style="background:linear-gradient(135deg,${d.c}33,${d.c}11);border-radius:16px;padding:16px 18px;margin-bottom:14px;border:1px solid ${d.c}33">
<div style="font-size:16px;font-weight:700;color:${d.c}">${d.t}</div>
${d.nt?`<div style="font-size:12px;color:#888;margin-top:4px">${d.nt}</div>`:''}
</div>`;

// Tabs
h+=`<div class="tab-bar">`;
["exercises","warmup","cooldown"].forEach(t=>{
const labels={exercises:`Exercises (${d.ex.length})`,warmup:"Warm-Up",cooldown:"Cool-Down"};
h+=`<button class="btn tab-btn ${tab===t?'active':''}" style="${tab===t?'background:'+d.c:''}" onclick="setTab('${t}')">${labels[t]}</button>`;
});
h+=`</div>`;

if(tab==="exercises"){
if(wk===1) h+=`<button class="btn" onclick="toggleStart()" style="width:100%;padding:10px 16px;margin-bottom:12px;border-radius:12px;border:1px solid #92400e55;background:${showStart?'#92400e22':'transparent'};color:#fbbf24;font-size:12px;font-weight:600;text-align:left">🎯 ${showStart?'Hide':'Show'} Starting Weights</button>`;

d.ex.forEach((ex,ei)=>{
const ns=gns(ex.s),isM=ex.s.includes("6–8")&&ex.r==="90s";
h+=`<div class="fu" style="--ac:${d.c};animation-delay:${ei*30}ms;margin-bottom:12px">
<div style="background:rgba(255,255,255,.04);border-radius:16px;border:${isM?`1px solid ${d.c}44`:'1px solid rgba(255,255,255,.06)'};overflow:hidden">`;
if(isM) h+=`<div style="height:3px;background:${d.c}"></div>`;
h+=`<div style="padding:14px 16px">
<div style="display:flex;justify-content:space-between;align-items:flex-start">
<div style="flex:1">
<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
<span style="font-size:15px;font-weight:700;color:#fff">${ex.n}</span>
${isM?`<span style="font-size:9px;font-weight:700;background:${d.c};color:#fff;padding:2px 8px;border-radius:6px">MAIN</span>`:''}
</div>
<div style="font-size:12px;color:#666;margin-top:3px">${ex.nt}</div>
<div style="font-size:10px;color:#7b2cbf;margin-top:3px;font-weight:500">${ex.mu}</div>
</div>
<div style="text-align:right;flex-shrink:0;margin-left:12px">
<div class="mono" style="font-size:15px;font-weight:700;color:${d.c}">${ex.s}</div>
<div style="font-size:11px;color:#555">${ex.r} rest</div>
</div></div>`;
if(wk===1&&showStart&&ex.kg) h+=`<div class="start-badge"><span style="font-weight:700;color:#fbbf24">🎯 ${ex.kg} kg</span><span style="color:#a78234;margin-left:6px">${ex.kn}</span></div>`;
h+=`<a href="${ex.yt}" target="_blank" rel="noopener" class="yt-btn">▶ Watch Form</a>`;
h+=`</div>`;
// Input grid
h+=`<div style="padding:10px 16px 14px;border-top:1px solid rgba(255,255,255,.04)">
<div style="display:grid;grid-template-columns:32px 1fr 1fr;gap:6px 10px;align-items:center">
<span style="font-size:10px;font-weight:700;color:#444">SET</span>
<span style="font-size:10px;font-weight:700;color:#444">KG</span>
<span style="font-size:10px;font-weight:700;color:#444">REPS</span>`;
for(let si=0;si<ns;si++){
const pw=gpv(ad,ei,si,"w"),pr=gpv(ad,ei,si,"r"),vw=gv(ad,ei,si,"w"),vr=gv(ad,ei,si,"r");
h+=`<span class="mono" style="font-size:14px;font-weight:700;color:${d.c}">${si+1}</span>
<input type="number" inputmode="decimal" class="inp" style="--ac:${d.c}" placeholder="${pw||'—'}" value="${vw}" onchange="setVal('${ad}',${ei},${si},'w',this.value)" onfocus="this.style.borderColor='${d.c}'" onblur="this.style.borderColor='rgba(255,255,255,.08)'">
<input type="number" inputmode="numeric" class="inp" style="--ac:${d.c}" placeholder="${pr||'—'}" value="${vr}" onchange="setVal('${ad}',${ei},${si},'r',this.value)" onfocus="this.style.borderColor='${d.c}'" onblur="this.style.borderColor='rgba(255,255,255,.08)'">`;
}
h+=`</div></div></div></div>`;
});
// Cardio
h+=`<div style="background:${d.c}15;border-radius:14px;padding:14px 16px;border:1px solid ${d.c}22;margin-top:4px">
<div style="font-size:13px;font-weight:700;color:${d.c}">🏃 Cardio</div>
<div style="font-size:13px;color:#999;margin-top:4px">${d.cd}</div></div>`;

}else if(tab==="warmup"&&wu){
h+=`<div class="fi"><div style="font-size:11px;color:#666;margin-bottom:12px;font-style:italic">~6–8 min before workout</div>`;
wu.forEach((w,i)=>{h+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;${i<wu.length-1?'border-bottom:1px solid rgba(255,255,255,.05)':''}"><span style="font-size:14px;font-weight:500;color:#ccc">${w.n}</span><span class="mono" style="font-size:13px;font-weight:600;color:${d.c}">${w.d}</span></div>`});
h+=`</div>`;
}else if(tab==="cooldown"){
h+=`<div class="fi"><div style="font-size:11px;color:#666;margin-bottom:12px;font-style:italic">~6–8 min after workout. Extra hamstring focus.</div>`;
CD.forEach((c,i)=>{h+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;${i<CD.length-1?'border-bottom:1px solid rgba(255,255,255,.05)':''}"><span style="font-size:14px;font-weight:500;color:#ccc">${c.n}</span><span class="mono" style="font-size:13px;font-weight:600;color:#2d6a4f">${c.d}</span></div>`});
h+=`</div>`;
}
h+=`</div>`;
}
h+=`</div>`;
a.innerHTML=h;
}

// Global functions
window.setWk=function(w){state.wk=w;render()};
window.goWeek=function(){state.v="week";state.ad=null;render();window.scrollTo(0,0)};
window.openDay=function(dk){state.ad=dk;state.v="day";state.tab="exercises";render();window.scrollTo(0,0)};
window.setTab=function(t){state.tab=t;render()};
window.toggleStart=function(){state.showStart=!state.showStart;render()};
window.setVal=function(dk,ei,si,f,val){state.pd[`w${state.wk}_${dk}_ex${ei}_s${si}_${f}`]=val;sv()};
window.resetAll=function(){if(confirm("Delete ALL progress?")){state.pd={};localStorage.removeItem(SK);render()}};

render();
</script>
